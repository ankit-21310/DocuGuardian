services:
  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docuguardian
      POSTGRES_USER: docuguardian
      POSTGRES_PASSWORD: docuguardian
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["object_data:/data"]
  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    environment:
      DOCUGUARDIAN_DATA_DIR: /app/data
      CORS_ORIGINS: http://localhost:3000
      AUTH_SECRET: local-compose-secret-change-me
      ENVIRONMENT: development
      PROCESSING_MODE: worker
      AI_MODE: ${AI_MODE:-real}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: docuguardian
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      STORAGE_MODE: s3
    ports: ["8000:8000"]
    volumes: ["api_data:/app/data"]
    depends_on: [postgres, redis, minio]
  worker:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    command: ["python", "-m", "worker.runner"]
    environment:
      DOCUGUARDIAN_DATA_DIR: /app/data
      AUTH_SECRET: local-compose-secret-change-me
      ENVIRONMENT: development
      PROCESSING_MODE: worker
      AI_MODE: ${AI_MODE:-real}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      STORAGE_MODE: s3
      WORKER_POLL_SECONDS: 1
    volumes: ["api_data:/app/data"]
    depends_on: [api]
volumes:
  postgres_data:
  api_data:
  object_data:
